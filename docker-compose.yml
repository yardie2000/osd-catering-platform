# OSD Catering Platform — internal self-hosted deployment (Synology / Mac Mini).
# Reads the three Supabase vars from a local ".env" file (copy from .env.docker.example).
# Start:  docker compose up -d --build
# Update: git pull && docker compose up -d --build
# Open:   http://<host-ip>:3000

services:
  app:
    build:
      context: .
      args:
        # NEXT_PUBLIC_* must be present at BUILD time (baked into the browser bundle).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    image: osd-catering-platform:5.0.0
    container_name: osd-catering
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Server-side secret — only the API routes use it, never the browser.
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
